server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_tourism?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# 文件上传配置
upload:
  path: uploads
  url-prefix: /uploads

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# SiliconFlow API Configuration (兼容 OpenAI 格式)
deepseek:
  api-key: sk-cimilsgawunyxffxtkaolvcaejhpjfzcdvwlrlzazqgubmxo
  base-url: https://api.siliconflow.cn/v1

# Amap Configuration
amap:
  key: ce9e34be95d07974a6cd953d1934ce7e

# 电子门票配置
ticket:
  validity-days: 30              # 门票有效期（天）
  qr-code-size: 300              # 二维码尺寸（像素）
  secret-key: ${TICKET_SECRET:DEFAULT_SECRET_KEY_CHANGE_IN_PRODUCTION}   # 签名密钥（建议使用环境变量）
# Alipay Configuration (沙箱环境)
alipay:
  # 应用ID (从支付宝开放平台获取)
  app-id: 9021000159648843
  # 商户私钥 (使用支付宝密钥生成工具生成)
  private-key: 
  # 支付宝公钥 (从支付宝开放平台获取)
  public-key: 
  # 服务器异步通知页面路径
  notify-url: http://您的服务器地址/api/payment/alipay/notify
  # 页面跳转同步通知页面路径
  return-url: http://localhost:3000/payment/result
  # 签名方式
  sign-type: RSA2
  # 字符编码格式
  charset: UTF-8
  # 支付宝网关（沙箱环境）
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  # 格式
  format: json
